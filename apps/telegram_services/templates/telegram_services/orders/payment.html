<style>
/* Premium Liquid Glass Design System - iOS 26 Aesthetic */
:root {
    --glass-bg: rgba(18, 25, 44, 0.45);
    --glass-border: rgba(255, 255, 255, 0.08);
    --glass-blur: 40px;
    --glass-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
    --inner-highlight: inset 0 1px 1px rgba(255, 255, 255, 0.1);
    --accent-blue: #3b82f6;
    --accent-red: #ef4444;
    --text-main: #ffffff;
    --text-body: rgba(255, 255, 255, 0.75);
    --text-muted: rgba(255, 255, 255, 0.45);
    --radius-premium: 24px;
    --radius-button: 19px;
}

/* Base styling */
html { scroll-behavior: smooth; }
body {
    background-color: #050816;
    color: var(--text-main);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    line-height: 1.5;
    margin: 0;
    -webkit-font-smoothing: antialiased;
}

/* Apple Background with Fluid Glows */
.bg-canvas {
    position: fixed;
    inset: 0;
    z-index: -1;
    overflow: hidden;
    background: #050816;
}

.bg-glow {
    position: absolute;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.12;
    pointer-events: none;
}

.glow-blue {
    top: -10%; left: -10%;
    width: 60vw; height: 60vw;
    background: radial-gradient(circle, #3b82f6 0%, transparent 70%);
}

.glow-purple {
    bottom: -15%; right: -5%;
    width: 50vw; height: 50vw;
    background: radial-gradient(circle, #8b5cf6 0%, transparent 70%);
}

.bg-particles {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 0);
    background-size: 40px 40px;
    opacity: 0.5;
}

/* Layout System */
.payment-layout {
    display: grid;
    grid-template-columns: 2.125fr 1fr;
    gap: 32px;
    width: 100%;
    max-width: 1400px;
    margin: 0 auto;
    padding: 20px;
}

@media (max-width: 1100px) {
    .payment-layout {
        grid-template-columns: 1fr;
    }
}

/* Liquid Glass Cards */
.glass-card {
    backdrop-filter: blur(var(--glass-blur));
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    box-shadow: var(--glass-shadow), var(--inner-highlight);
    border-radius: var(--radius-premium);
    transition: all 400ms cubic-bezier(0.23, 1, 0.32, 1);
    position: relative;
    overflow: hidden;
}

.glass-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.03) 0%, transparent 100%);
    pointer-events: none;
}

.glass-card:hover {
    transform: translateY(-4px);
    border-color: rgba(255, 255, 255, 0.15);
    box-shadow: 0 35px 70px rgba(0, 0, 0, 0.5), var(--inner-highlight), 0 0 25px rgba(59, 130, 246, 0.08);
}

/* Typography */
.h-premium {
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.04em;
    margin: 0;
}

.text-premium-body { color: var(--text-body); font-weight: 500; font-size: 15px; }
.text-premium-muted { color: var(--text-muted); font-weight: 500; font-size: 13px; }

/* Apple Buttons */
.apple-btn {
    height: 54px;
    border-radius: var(--radius-button);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    font-weight: 700;
    font-size: 15px;
    transition: all 300ms cubic-bezier(0.23, 1, 0.32, 1);
    cursor: pointer;
    border: 1px solid rgba(255, 255, 255, 0.1);
    position: relative;
    overflow: hidden;
    color: white;
    text-decoration: none;
}

.apple-btn:active { transform: scale(0.97); }

.btn-glass {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(10px);
    border-color: rgba(255, 255, 255, 0.1);
}

.btn-glass:hover {
    background: rgba(255, 255, 255, 0.1);
    border-color: rgba(255, 255, 255, 0.2);
}

.btn-red-liquid {
    background: linear-gradient(170deg, #ff4c4c 0%, #cc0000 100%);
    box-shadow: 0 10px 25px rgba(239, 68, 68, 0.3), inset 0 1px 1px rgba(255, 255, 255, 0.2);
    border: 1px solid rgba(255, 255, 255, 0.15);
}

.btn-red-liquid:hover {
    background: linear-gradient(170deg, #ff6666 0%, #e60000 100%);
    box-shadow: 0 15px 35px rgba(239, 68, 68, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.3);
    transform: translateY(-2px);
}

.btn-blue-liquid {
    background: linear-gradient(170deg, #60a5fa 0%, #2563eb 100%);
    box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3), inset 0 1px 1px rgba(255, 255, 255, 0.2);
    border: 1px solid rgba(255, 255, 255, 0.15);
}

.btn-blue-liquid:hover {
    background: linear-gradient(170deg, #93c5fd 0%, #3b82f6 100%);
    box-shadow: 0 15px 35px rgba(59, 130, 246, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.3);
    transform: translateY(-2px);
}

/* Special Components */
.amount-hero {
    text-align: center;
    padding: 48px 32px;
}

.large-amount-flex {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 8px;
    margin-top: 10px;
}

.large-amount-value {
    font-size: 64px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.05em;
    line-height: 1;
    position: relative;
    z-index: 1;
}

.blue-glow-spot {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 250px; height: 250px;
    background: radial-gradient(circle, rgba(59, 130, 246, 0.25) 0%, transparent 70%);
    z-index: -1;
}

/* Status Pill */
.status-pill {
    padding: 6px 14px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    display: inline-flex;
    align-items: center;
    gap: 6px;
}

.pill-waiting { background: rgba(251, 191, 36, 0.15); color: #fbbf24; border-color: rgba(251, 191, 36, 0.25); }
.pill-success { background: rgba(34, 197, 94, 0.15); color: #34d399; border-color: rgba(34, 197, 94, 0.25); }
.pill-failed { background: rgba(239, 68, 68, 0.15); color: #f87171; border-color: rgba(239, 68, 68, 0.25); }
.pill-processing { background: rgba(59, 130, 246, 0.15); color: #60a5fa; border-color: rgba(59, 130, 246, 0.25); }

/* Apple Progress Timeline */
.apple-timeline {
    position: relative;
    padding-left: 48px;
    margin-top: 24px;
}

.timeline-track {
    position: absolute;
    left: 17px;
    top: 10px;
    bottom: 10px;
    width: 2px;
    background: rgba(255, 255, 255, 0.05);
}

.timeline-step {
    position: relative;
    padding-bottom: 28px;
}

.timeline-step:last-child { padding-bottom: 0; }

.step-node {
    position: absolute;
    left: -48px;
    top: 0;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255, 255, 255, 0.05);
    border: 2px solid rgba(255, 255, 255, 0.1);
    z-index: 1;
    transition: all 400ms ease;
    color: rgba(255, 255, 255, 0.3);
}

.timeline-step.completed .step-node {
    background: #34d399;
    border-color: #34d399;
    color: #050816;
    box-shadow: 0 0 20px rgba(52, 211, 153, 0.3);
}

.timeline-step.active .step-node {
    background: #3b82f6;
    border-color: #60a5fa;
    color: #fff;
    box-shadow: 0 0 25px rgba(59, 130, 246, 0.4);
    animation: blue-pulse 2s infinite;
}

@keyframes blue-pulse {
    0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.5); }
    70% { box-shadow: 0 0 0 12px rgba(59, 130, 246, 0); }
    100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
}

.step-label { font-weight: 700; font-size: 14px; color: var(--text-muted); }
.timeline-step.active .step-label { color: #fff; }
.timeline-step.completed .step-label { color: #34d399; }

/* Utilities */
.separator {
    height: 1px;
    background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.06) 50%, rgba(255,255,255,0) 100%);
    margin: 20px 0;
}

.hover-lift { transition: transform 300ms ease; }
.hover-lift:hover { transform: translateY(-2px); }

.gift-admin-contact-card {
    margin-top: 18px;
    padding: 16px;
    border-radius: 18px;
    background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(37, 99, 235, 0.12));
    border: 1px solid rgba(96, 165, 250, 0.25);
    box-shadow: 0 18px 40px rgba(37, 99, 235, 0.16);
}

.gift-admin-contact-alert {
    font-size: 13px;
    line-height: 1.65;
    color: #eff6ff;
    margin-bottom: 12px;
    font-weight: 600;
    white-space: pre-line;
}

.gift-admin-contact-btn {
    width: 100%;
    height: 54px;
    border-radius: 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: white;
    font-weight: 800;
    font-size: 15px;
    text-decoration: none;
    background: linear-gradient(135deg, #60a5fa 0%, #2563eb 100%);
    border: 1px solid rgba(255,255,255,0.18);
    box-shadow: 0 14px 32px rgba(37, 99, 235, 0.26);
    transition: transform 220ms ease, box-shadow 220ms ease;
    animation: gift-contact-glow 2.2s ease-in-out infinite;
}

.gift-admin-contact-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 18px 42px rgba(37, 99, 235, 0.35);
}

@keyframes gift-contact-glow {
    0%, 100% { box-shadow: 0 14px 32px rgba(37, 99, 235, 0.26); }
    50% { box-shadow: 0 18px 42px rgba(59, 130, 246, 0.4); }
}

@media (max-width: 640px) {
    .gift-admin-contact-card { padding: 14px; }
    .gift-admin-contact-alert { font-size: 12px; }
    .gift-admin-contact-btn { height: 52px; font-size: 14px; }
}

                                <i data-lucide="shield" class="w-4 h-4"></i>
                            </div>
                            <div class="step-content">
                                <div class="step-label">Tasdiqlash</div>
                                <div class="text-[10px] text-premium-muted">Avtomatik verify</div>
                            </div>
                        </div>
                        
                        <!-- Step 4 -->
                        <div class="timeline-step">
                            <div class="step-node">
                                <i data-lucide="send" class="w-4 h-4"></i>
                            </div>
                            <div class="step-content">
                                <div class="step-label">Yetkazib berish</div>
                                <div class="text-[10px] text-premium-muted">Xizmat bajarilmoqda</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    {% endif %}
</div>

<!-- Glassmorphic Confirmation Modal -->
<div id="balancePaymentModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-xl transition-all duration-300">
    <div class="w-full max-w-md glass-card p-1 overflow-hidden transform scale-95 transition-transform duration-300">
        <div class="p-8 space-y-6">
            <!-- Header -->
            <div class="flex items-center gap-4 border-b border-white/5 pb-6">
                <div class="w-12 h-12 bg-blue-500/10 rounded-2xl flex items-center justify-center text-blue-400">
                    <i data-lucide="shield-check" class="w-6 h-6"></i>
                </div>
                <div>
                    <h3 class="h-premium text-lg">To'lovni tasdiqlash</h3>
                    <p class="text-[10px] text-white/40 font-black uppercase tracking-widest">Hamyon orqali xarid</p>
                </div>
                <button type="button" class="ml-auto w-8 h-8 rounded-full flex items-center justify-center hover:bg-white/5 transition" onclick="closePaymentModal()">
                    <i data-lucide="x" class="w-4 h-4 text-white/40"></i>
                </button>
            </div>

            <!-- Details -->
            <div class="space-y-4 bg-white/[0.02] border border-white/[0.05] p-5 rounded-2xl">
                <div class="flex justify-between items-center text-sm">
                    <span class="text-white/40 font-medium">Xizmat:</span>
                    <span class="text-white font-bold">{{ order.product.name }}</span>
                </div>
                <div class="flex justify-between items-center text-sm">
                    <span class="text-white/40 font-medium">Telegram:</span>
                    <span class="text-blue-400 font-bold">@{{ order.telegram_username }}</span>
                </div>
                <div class="separator opacity-50"></div>
                <div class="flex justify-between items-center">
                    <span class="text-white/40 font-medium">Yechib olinadi:</span>
                    <span class="text-xl font-black text-white">{{ order.unique_amount|floatformat:0 }} UZS</span>
                </div>
            </div>

            <!-- Warning -->
            <div class="p-4 bg-amber-500/10 border border-amber-400/10 rounded-2xl flex gap-3">
                <i data-lucide="alert-circle" class="w-4 h-4 text-amber-500 flex-shrink-0 mt-0.5"></i>
                <p class="text-[11px] text-amber-100/70 leading-relaxed font-medium">
                    Tasdiqlash tugmasini bosganingizda mablag' hamyoningizdan yechiladi va buyurtma bajarilishi boshlanadi.
                </p>
            </div>

            <!-- Actions -->
            <div class="grid grid-cols-2 gap-4">
                <button type="button" class="apple-btn btn-glass" onclick="closePaymentModal()">
                    Bekor qilish
                </button>
                <button type="button" class="apple-btn btn-blue-liquid" id="confirmModalPayBtn" onclick="executeBalancePayment()">
                    <i data-lucide="check" class="w-4 h-4"></i> Tasdiqlash
                </button>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block extra_js %}
<script>
// Expiration Countdown logic
const expiresAt = {{ expires_at_epoch }};
const countdownLabel = document.getElementById('countdownLabel');

function updateTimer() {
    const now = Math.floor(Date.now() / 1000);
    const timeLeft = expiresAt - now;
    
    if (timeLeft <= 0) {
        countdownLabel.textContent = "TIMEOUT";
        countdownLabel.parentElement.className = "flex items-center gap-1.5 px-3 py-1 bg-red-500/10 border border-red-500/20 rounded-xl";
        return;
    }
    
    const minutes = Math.floor(timeLeft / 60);
    const seconds = timeLeft % 60;
    countdownLabel.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
}

if (expiresAt) {
    updateTimer();
    setInterval(updateTimer, 1000);
}

</script>
<script src="{% static 'js/hamyon-payment-controller.js' %}"></script>
<script>
const giftAdminContactData = {{ gift_admin_contact_json|safe }};
const telegramHamyonCreateUrl = '{% url "telegram_services:create_hamyon_payment" order.id %}';
const telegramHamyonController = new HamyonPaymentController({
    createUrl: telegramHamyonCreateUrl,
    timelineSteps: [
        { key: 'waiting_payment', label: "To'lov kutilmoqda" },
        { key: 'paid', label: "To'lov tasdiqlandi" },
        { key: 'processing', label: 'Yetkazish boshlandi' },
        { key: 'completed', label: 'Bajarildi' },
    ],
    giftAdminContact: giftAdminContactData,
    onSuccess: (data) => {
        setTimeout(() => {
            window.location.href = data.redirect_url || window.location.href;
        }, 1800);
    },
});

document.getElementById('hamyonPayBtn')?.addEventListener('click', async () => {
    const btn = document.getElementById('hamyonPayBtn');
    if (typeof LoadingState !== 'undefined') LoadingState.show(btn);
    try {
        await telegramHamyonController.start(null, {
            title: "Hamyon To'lovi",
            subtitle: 'Tashqi o\'tkazma',
            serviceLabel: '{{ order.product.name|escapejs }}',
            amountLabel: '{{ order.unique_amount|floatformat:0 }} UZS',
        });
    } catch (error) {
        if (typeof Toast !== 'undefined') {
            new Toast('❌ ' + (error.message || "Hamyon to'lovini yaratishda xatolik"), 'danger');
        }
    } finally {
        if (typeof LoadingState !== 'undefined') LoadingState.hide(btn);
    }
});

// Pay using platform balance
function payFromBalance() {
    const btn = document.getElementById('payFromBalanceBtn');
    if (!btn || btn.disabled) return;
    
    openPaymentModal();
}

function openPaymentModal() {
    const modal = document.getElementById('balancePaymentModal');
    if (modal) {
        modal.classList.remove('hidden');
        modal.classList.add('flex');
        setTimeout(() => {
            modal.firstElementChild.classList.remove('scale-95');
            modal.firstElementChild.classList.add('scale-100');
        }, 10);
        if (typeof lucide !== 'undefined') {
            lucide.createIcons();
        }
    }
}

function closePaymentModal() {
    const modal = document.getElementById('balancePaymentModal');
    if (modal) {
        modal.firstElementChild.classList.remove('scale-100');
        modal.firstElementChild.classList.add('scale-95');
        setTimeout(() => {
            modal.classList.remove('flex');
            modal.classList.add('hidden');
        }, 150);
    }
}

async function executeBalancePayment() {
    const btn = document.getElementById('confirmModalPayBtn');
    if (!btn || btn.disabled) return;
    
    LoadingState.show(btn);
    
    try {
        const response = await fetch(`/telegram-services/orders/{{ order.id }}/pay-from-balance/`, {
            method: 'POST',
            headers: {
                'X-CSRFToken': getCsrfToken(),
                'Content-Type': 'application/json'
            }
        });
        
        const data = await response.json();
        
        if (data.success) {
            closePaymentModal();
            new Toast(data.message || 'To\'lov muvaffaqiyatli amalga oshirildi!', 'success');
            setTimeout(() => {
                window.location.href = data.redirect_url;
            }, 1500);
        } else {
            new Toast('❌ ' + (data.message || 'Xatolik yuz berdi'), 'danger');
        }
    } catch (error) {
        new Toast('❌ ' + error.message, 'danger');
    } finally {
        LoadingState.hide(btn);
    }
}

// Premium Overrides
window.copyToClipboard = function(text, button = null) {
    navigator.clipboard.writeText(text).then(() => {
        if (button) {
            const originalHTML = button.innerHTML;
            button.innerHTML = '<i data-lucide="check" class="w-4 h-4 text-emerald-400"></i> Nusxalandi!';
            button.classList.add('scale-95', 'opacity-80');
            if (window.lucide) lucide.createIcons();
            
            setTimeout(() => {
                button.innerHTML = originalHTML;
                button.classList.remove('scale-95', 'opacity-80');
                if (window.lucide) lucide.createIcons();
            }, 2000);
        }
        new Toast('✅ Muvaffaqiyatli nusxalandi', 'success');
    });
};

const OriginalLoadingShow = LoadingState.show;
LoadingState.show = function(element) {
    if (!element) return;
    element.disabled = true;
    element.dataset.originalContent = element.innerHTML;
    element.innerHTML = `
        <div class="flex items-center gap-2">
            <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span>Yuklanmoqda...</span>
        </div>
    `;
};
</script>
{% endblock %}
