{% extends 'adminpanel/base_admin.html' %}
{% block title %}Yangi Banner{% endblock %}
{% block content %}
<h2 class="fw-bold mb-4">Slider Banner qo'shish</h2>
<form method="POST" enctype="multipart/form-data" class="card p-4">
    {% csrf_token %}
    <div class="row g-3">
        <div class="col-md-6"><label class="form-label">Sarlavha</label><input name="title" class="form-control bg-dark text-white border-secondary" required></div>
        <div class="col-md-6"><label class="form-label">Subtitr</label><input name="subtitle" class="form-control bg-dark text-white border-secondary"></div>
        <div class="col-md-8"><label class="form-label">Havola</label><input name="link_url" class="form-control bg-dark text-white border-secondary"></div>
        <div class="col-md-2"><label class="form-label">Tartib</label><input name="order" type="number" class="form-control bg-dark text-white border-secondary" value="0"></div>
        <div class="col-md-2"><label class="form-label">Faol</label><input type="checkbox" name="is_active" class="form-check-input mt-2" checked></div>
        <div class="col-12"><label class="form-label">Rasm *</label><input name="image" type="file" class="form-control bg-dark text-white border-secondary" accept="image/*" required></div>
    </div>
    <button type="submit" class="btn btn-primary mt-4">Saqlash</button>
</form>
{% endblock %}
