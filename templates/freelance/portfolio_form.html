{% extends 'base.html' %}

{% block title %}Portfolio qo'shish{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto">
    <form method="post" enctype="multipart/form-data" class="glass p-8 rounded-2xl space-y-4">
        {% csrf_token %}
        {% for field in form %}<div><label class="block text-sm font-bold mb-2">{{ field.label }}</label>{{ field }}</div>{% endfor %}
        <button type="submit" class="w-full py-3 bg-primary-600 text-white rounded-xl font-bold">Saqlash</button>
    </form>
</div>
{% endblock %}
