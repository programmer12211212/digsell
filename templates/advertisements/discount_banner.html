{% load static advertisement_tags %}

{% if banner %}
<div class="w-full mb-8 {{ banner|get_device_css }}">
    <a href="{{ banner.cta_url }}"
       {% if banner.cta_target_blank %}target="_blank"{% endif %}
       @click="recordClick('{{ banner.id }}')"
       class="group block relative overflow-hidden rounded-3xl h-56 md:h-64 lg:h-72 shadow-2xl hover:shadow-2xl hover:shadow-slate-900/40 transition-all duration-300">
        
        <!-- Background Image -->
        {% if banner.image %}
            <div class="absolute inset-0 bg-cover bg-center group-hover:scale-105 transition-transform duration-500"
                 style="background-image: url('{{ banner.image.url }}');"></div>
        {% else %}
            <div class="absolute inset-0 bg-gradient-to-br from-slate-800 to-slate-900"></div>
        {% endif %}
        
        <!-- Overlay -->
        <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/40 to-transparent"></div>
        
        <!-- Content -->
        <div class="absolute inset-0 flex flex-col justify-end p-6 md:p-8">
            {% if banner.heading %}
                <h3 class="text-2xl md:text-3xl font-bold text-white mb-2">
                    {{ banner.heading }}
                </h3>
            {% endif %}
            
            {% if banner.content %}
                <p class="text-slate-200 mb-4">{{ banner.content }}</p>
            {% endif %}
            
            {% if banner.cta_text %}
                <span class="inline-flex items-center text-white font-semibold">
                    {{ banner.cta_text }}
                    <i data-lucide="arrow-right" class="ml-2 w-5 h-5 group-hover:translate-x-1 transition-transform"></i>
                </span>
            {% endif %}
        </div>
    </a>
</div>
{% endif %}
