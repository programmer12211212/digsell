{% load static advertisement_tags %}

{% if banner %}
<div class="w-full mb-8 {{ banner|get_device_css }}">
    <a href="{{ banner.cta_url }}" 
       {% if banner.cta_target_blank %}target="_blank"{% endif %}
       @click="recordClick('{{ banner.id }}')"
       class="group block relative overflow-hidden rounded-2xl bg-slate-950/50 backdrop-blur-xl border border-slate-800/50 hover:border-slate-700/50 transition-all duration-300 shadow-lg hover:shadow-xl">
        
        <!-- Background -->
        {% if banner.image %}
            <div class="absolute inset-0 opacity-40 group-hover:opacity-50 transition-opacity duration-300"
                 style="background-image: url('{{ banner.image.url }}'); background-size: cover; background-position: center;"></div>
        {% endif %}
        
        <!-- Gradient Overlay -->
        <div class="absolute inset-0 bg-gradient-to-r from-slate-900/80 to-slate-900/40"></div>
        
        <!-- Content -->
        <div class="relative p-6 md:p-8">
            <div class="flex items-center justify-between">
                <div class="flex-1">
                    {% if banner.heading %}
                        <h3 class="text-xl md:text-2xl font-bold text-white mb-1">
                            {{ banner.heading }}
                        </h3>
                    {% endif %}
                    
                    {% if banner.subheading %}
                        <p class="text-sm md:text-base text-slate-300">
                            {{ banner.subheading }}
                        </p>
                    {% endif %}
                </div>
                
                <div class="flex-shrink-0 ml-6">
                    <i data-lucide="arrow-right" class="w-6 h-6 text-slate-400 group-hover:text-white transition-colors"></i>
                </div>
            </div>
        </div>
    </a>
</div>
{% endif %}
